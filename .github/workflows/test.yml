name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Check bash syntax
        run: bash -n update-technitium-ip.sh && bash -n tests/run_tests.sh

      - name: Run unit tests
        run: |
          chmod +x tests/run_tests.sh tests/mocks/curl
          ./tests/run_tests.sh
